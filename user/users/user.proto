syntax = "proto3";
package user;
option go_package = "github.com/InBitGT/proto-definitions/user";

service UserService {
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserAuthResponse);
  rpc GetUserByID    (GetUserByIDRequest)    returns (UserAuthResponse);
}

message GetUserByEmailRequest { string email = 1; }
message GetUserByIDRequest    { uint64 id    = 1; }

message UserAuthResponse {
  uint64 id            = 1;
  uint64 tenant_id     = 2;
  string email         = 3;
  string username      = 4;
  string password_hash = 5;
  string first_name    = 6;
  string last_name     = 7;
  uint64 role_id       = 8;
  string role_name     = 9;
  bool   is_active     = 10;
  string status        = 11;
}