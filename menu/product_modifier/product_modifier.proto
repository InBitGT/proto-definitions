syntax = "proto3";

package menu.product_modifier;

option go_package = "github.com/InBitGT/proto-definitions/menu/product_modifier;productmodifierpb";

service ProductModifierService {
  rpc CreateProductModifier (CreateProductModifierRequest) returns (CreateProductModifierResponse);
  rpc GetProductModifierByProductID (GetProductModifierByProductIDRequest) returns (GetProductModifierByProductIDResponse);
  rpc UpdateProductModifierByProductID (UpdateProductModifierByProductIDRequest) returns (UpdateProductModifierByProductIDResponse);
  rpc DeactivateProductModifierByProductID (DeactivateProductModifierByProductIDRequest) returns (DeactivateProductModifierByProductIDResponse);
}

message CreateProductModifierRequest {
  uint64 modifier_product_id = 1;
  double quantity = 2;
  int32 min_selection = 3;
  int32 max_selection = 4;
  double price_adjustment = 5;
  bool is_default = 6;
}

message CreateProductModifierResponse {
  bool success = 1;
  uint64 product_modifier_id = 2;
}

message GetProductModifierByProductIDRequest {
  uint64 modifier_product_id = 1;
}

message GetProductModifierByProductIDResponse {
  bool success = 1;
  uint64 product_modifier_id = 2;
  uint64 modifier_product_id = 3;
  double quantity = 4;
  int32 min_selection = 5;
  int32 max_selection = 6;
  double price_adjustment = 7;
  bool is_default = 8;
}

message UpdateProductModifierByProductIDRequest {
  uint64 modifier_product_id = 1;
  double quantity = 2;
  int32 min_selection = 3;
  int32 max_selection = 4;
  double price_adjustment = 5;
  bool is_default = 6;
}

message UpdateProductModifierByProductIDResponse {
  bool success = 1;
}

message DeactivateProductModifierByProductIDRequest {
  uint64 modifier_product_id = 1;
}

message DeactivateProductModifierByProductIDResponse {
  bool success = 1;
}